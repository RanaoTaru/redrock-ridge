            <div style="position: absolute; display: none; white-space: nowrap; bottom: -21px;" id="cursor-pointer-text">
                <span style="white-space: nowrap; opacity: .42;">Loading 3d model</span>
                <img src="assets/images/loadingdots.gif" alt="" style="height: 4px; object-fit: cover;" />
            </div>
            <div id="image-cont"></div>
        </div>
        <div style="position: absolute; display: none; justify-content: right; flex-wrap: wrap; flex-direction: row; width: 18vw; height: 26vh; right: 6px; top: 127px; opacity: var(--icon-opacity);" id="three-view-buttons">
            <img src="assets/images/zoom in.webp" alt="" onclick="zoomIn(!0)" style="margin: 0 6px; max-height: 36px; cursor: pointer;" />
            <img src="assets/images/zoom out.webp" alt="" onclick="zoomIn(!1)" style="margin: 0 6px; max-height: 36px; cursor: pointer;" />
            <div id="magnify-icon" style="display: none;">
                <img onclick="magnifyView({})" src="assets/images/magnify.webp" alt="" style="margin: 0 6px; max-height: 36px; cursor: pointer;" />
            </div>
            <img src="assets/images/download.webp" alt="" onclick="download()" style="margin: 0 6px; max-height: 36px; cursor: pointer;" />
        </div>
        <div disabled style="position: absolute; display: none; justify-content: center; align-items: center; left: 0px; top: 0px; pointer-events: none;" id="magnify-lens-cont">
            <img hidden src="assets/images/magnify handle.webp" alt="" style="position: absolute; right: -7px; bottom: -7px; opacity: .86;" id="magnify-lens-handle" />
            <div
                disabled
                style="position: relative; display: flex; justify-content: center; align-items: center; width: 0px; height: 0px; border-radius: 50%; border-style: solid; border-width: 5.5px; border-color: #a6a6a6; overflow: hidden;"
                id="magnify-lens-frame"
            >
                <div style="position: absolute; left: 0px; top: 0px; opacity: .96; background-size: 100% 100%;" id="magnify-lens"></div>
            </div>
        </div>
        <div id="move-here-marker" style="position: absolute; display: none; cursor: pointer; pointer-events: none;">
            <div class="move-here">
                <img src="assets/textures/move_here.gif" onclick="setDestinationMarker({ e: this })" style="pointer-events: auto;" />
            </div>
        </div>
        <div class="error-modal" style="display: none;"></div>
        <div class="file-dnd" style="z-index: 1" ondragover="event.preventDefault(); event.currentTarget.classList.add('drag-over')" ondragleave="event.currentTarget.classList.remove('drag-over')" ondrop="event.preventDefault(); event.currentTarget.classList.remove('drag-over'); const files = event.dataTransfer.files; if (files && files.length) _pm.model.loadGLTFile({ f: files[0], i: (Math.random() + 1).toString(36).substring(7), r: new FileReader() })">
            <label for="upload-model">Load your model:</label>
            <input type="file" id="upload-model" accept=".glb" hidden onchange="_pm.model.loadGLTFile({ f: this.files[0], i: (Math.random() + 1).toString(36).substring(7), r: new FileReader() }); this.value=''"/>
            <div onclick="document.getElementById('upload-model').click()">
                <img src="assets/images/gltf.webp"/>
                <h4>Drag & Drop GLTF or Browse</h4>
            </div>
        </div>
        <script>
            _pm = Object.assign(_pm, { screen: document.getElementById("three-canvas") });
            _pm.screen.style.opacity = _pm.p.physics ? .01 : 1;
            document.getElementById("cursor-pointer-text").style.display = _pm.p.physics ? "none" : "block";
        </script>
    </body>
</html>
